<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justin专属单词背诵程序</title>
  <style>
    :root {
      /* 颜色主题 */
      --bg: #0b0d12;
      --panel: #141821;
      --panel-light: #1c2331;
      --panel-dark: #0f131b;
      --text: #f4f7fb;
      --muted: #8691a2;
      --accent: #ffffff;
      --danger: #e35d6a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 通用视图容器 */
    .view {
      display: none;
      padding: 24px;
    }
    .view.active {
      display: block;
    }

    /* 登录页 */
    #login-page {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 0 20px;
    }
    .login-container {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 20px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .login-container h1 {
      margin: 0 0 16px;
      font-size: 22px;
      line-height: 1.4;
    }
    .login-container p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .login-container input {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid var(--panel-light);
      border-radius: 12px;
      background: var(--panel-dark);
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
    }
    .login-container button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: var(--accent);
      color: #111318;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .login-container button:hover {
      background: #f5f5f5;
    }

    /* 头部标题 */
    header h1, header h2 {
      margin: 0;
      font-size: 24px;
    }
    header {
      margin-bottom: 20px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 16px;
      cursor: pointer;
      margin-right: 12px;
    }

    /* 主页面 */
    #main-page header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    #main-page header h1 {
      font-size: 28px;
    }
    .import-section {
      margin-bottom: 24px;
    }
    .import-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 16px;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s ease;
    }
    .import-btn:hover {
      background: var(--panel-light);
    }
    .lists-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .list-column {
      flex: 1 1 320px;
      min-width: 260px;
    }
    .list-column h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--muted);
    }
    .list-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .list-item {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .list-item:hover {
      background: var(--panel-light);
    }
    .list-name {
      font-size: 16px;
    }
    .list-count {
      font-size: 14px;
      color: var(--muted);
      margin-left: 8px;
    }
    .list-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
    }
    .icon-btn:hover {
      color: var(--accent);
    }

    /* 导入页面 */
    #import-page .import-form {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 20px;
    }
    #import-page h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
    }
    #import-page input[type="number"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid var(--panel-light);
      border-radius: 10px;
      background: var(--panel-dark);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    #import-page textarea {
      width: 100%;
      height: 140px;
      padding: 10px;
      margin-bottom: 12px;
      background: var(--panel-dark);
      color: var(--text);
      border: 1px solid var(--panel-light);
      border-radius: 10px;
      resize: vertical;
      font-size: 14px;
    }
    #import-page button {
      background: var(--accent);
      color: #111318;
      border: none;
      border-radius: 12px;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    #import-page button:hover {
      background: #f5f5f5;
    }

    /* 模式选择页面 */
    #mode-page .mode-select {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 16px;
      padding: 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    #mode-page h3 {
      margin-top: 0;
      font-size: 16px;
    }
    .mode-btn, .order-btn, #start-study {
      display: inline-block;
      margin: 6px 4px;
      padding: 10px 14px;
      border: 1px solid var(--panel-light);
      border-radius: 12px;
      background: var(--panel-dark);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease;
    }
    .mode-btn.active, .order-btn.active {
      background: var(--accent);
      color: #111318;
    }
    #start-study {
      background: var(--accent);
      color: #111318;
      margin-top: 16px;
      width: 100%;
    }
    #start-study:hover {
      background: #f5f5f5;
    }

    /* 学习页面 */
    #study-page #study-list {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 14px;
      overflow: auto;
      max-height: calc(100vh - 160px);
    }
    .study-row {
      display: grid;
      grid-template-columns: 50px 1fr 1fr 40px;
      /* 拉伸每列，使提示框与答案框始终等高 */
      align-items: stretch;
      border-bottom: 1px solid var(--panel-light);
    }
    .study-row:last-child {
      border-bottom: none;
    }
    .study-row span, .study-row div {
      padding: 10px;
      word-break: break-word;
      /* 让每个单元格撑满所在的网格宽高 */
      width: 100%;
    }
    .study-index {
      text-align: center;
      color: var(--muted);
    }
    .study-prompt {
      background: var(--panel-dark);
      border-radius: 10px;
      min-height: 46px;
      /* 去除 flex 布局和固定高度，让其自动撑满行高 */
    }
    .study-answer {
      background: var(--panel-dark);
      border-radius: 10px;
      min-height: 46px;
      cursor: pointer;
      color: var(--muted);
    }
    .study-answer.show {
      color: var(--text);
    }
    .ghost-btn {
      text-align: center;
      font-size: 20px;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s ease;
    }
    .ghost-btn:hover {
      color: var(--accent);
    }

    /* 预览页面 */
    #preview-page #preview-list {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 14px;
      overflow: auto;
      max-height: calc(100vh - 160px);
    }
    .preview-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--panel-light);
    }
    .preview-row:last-child {
      border-bottom: none;
    }
    .preview-row div {
      padding: 10px;
      word-break: break-word;
    }
    .preview-en {
      background: var(--panel-dark);
    }
    .preview-zh {
      background: var(--panel-dark);
    }

    /* 弹窗 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.hidden {
      display: none;
    }
    .modal-content {
      background: var(--panel);
      border: 1px solid var(--panel-light);
      border-radius: 16px;
      padding: 24px;
      min-width: 240px;
      max-width: 90%;
      text-align: center;
    }
    .modal-content p {
      margin: 0 0 20px;
      font-size: 16px;
    }
    .modal-actions {
      display: flex;
      justify-content: space-around;
      gap: 20px;
    }
    .modal-actions button {
      flex: 1 1 auto;
      padding: 8px 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    #modal-cancel {
      background: var(--panel-light);
      color: var(--text);
    }
    #modal-cancel:hover {
      background: var(--panel-dark);
    }
    #modal-confirm {
      background: var(--accent);
      color: #111318;
    }
    #modal-confirm:hover {
      background: #f5f5f5;
    }

    /* 响应式布局 */
    @media (max-width: 768px) {
      .lists-container {
        flex-direction: column;
      }
      .list-column {
        width: 100%;
      }
      .study-row {
        grid-template-columns: 40px 1fr 1fr 30px;
      }
    }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <!--
    欢迎页：用户输入固定密码后进入主界面。按照用户要求，标题去掉了空格和“的”字，
    并且使用“背诵”二字突出功能。成功登录后直接切换到主界面，而不是采用滑动展开的方式。
  -->
  <div id="login-page" class="view active">
    <div class="login-container">
      <!-- 登录标题使用统一的文案，无空格且突出“背诵” -->
      <h1>欢迎来到Justin专属单词背诵程序</h1>
      <p>请输入密码后进入</p>
      <input type="password" id="login-password" placeholder="请输入密码" />
      <button id="login-btn">进入</button>
    </div>
  </div>

  <!-- 主页面 -->
  <div id="main-page" class="view">
    <header>
      <h1>Justin专属单词背诵程序</h1>
    </header>
    <div class="import-section">
      <button id="open-import" class="import-btn">导入单词</button>
    </div>
    <div class="lists-container">
      <!-- 新单词栏 -->
      <div class="list-column">
        <h2>新单词</h2>
        <div id="new-lists" class="list-container"></div>
      </div>
      <!-- 需巩固单词及终巩固单词栏 -->
      <div class="list-column">
        <!-- 需巩固单词组 -->
        <h2>需巩固单词</h2>
        <div id="review-lists" class="list-container"></div>
        <!-- 终巩固单词组：独立于需巩固列表显示在其下方 -->
        <h2 style="margin-top:24px;">巩固单词 final</h2>
        <div id="final-lists" class="list-container"></div>
      </div>
    </div>
  </div>

  <!-- 导入页面 -->
  <div id="import-page" class="view">
    <header style="display:flex; align-items:center;">
      <button id="import-back" class="back-btn">← 返回</button>
      <h2>导入单词</h2>
    </header>
    <div class="import-form">
      <h3>通过文件导入 CSV</h3>
      <input type="file" id="csv-file" accept=".csv,text/csv" />
      <label for="csv-group-size">每个列表单词数</label>
      <input type="number" id="csv-group-size" min="1" value="50" />
      <button id="import-file-btn">导入文件并分组</button>
    </div>
    <div class="import-form">
      <h3>直接粘贴内容（每行：英文,中文）</h3>
      <textarea id="paste-area" placeholder="look up,查词\nscroll down,向下滚动"></textarea>
      <label for="paste-group-size">每个列表单词数</label>
      <input type="number" id="paste-group-size" min="1" value="50" />
      <button id="import-paste-btn">导入粘贴内容并分组</button>
    </div>
  </div>

  <!-- 模式选择页面 -->
  <div id="mode-page" class="view">
    <header style="display:flex; align-items:center;">
      <button id="mode-back" class="back-btn">← 返回</button>
      <h2 id="mode-title">选择模式</h2>
    </header>
    <div class="mode-select">
      <h3>翻译方向</h3>
      <button id="mode-en2zh" class="mode-btn">英 → 中</button>
      <button id="mode-zh2en" class="mode-btn">中 → 英</button>
      <h3 style="margin-top:20px;">顺序</h3>
      <button id="order-normal" class="order-btn">顺序</button>
      <button id="order-reverse" class="order-btn">逆序</button>
      <button id="order-random" class="order-btn">随机</button>
      <button id="start-study">开始背诵</button>
    </div>
  </div>

  <!-- 学习页面 -->
  <div id="study-page" class="view">
    <header style="display:flex; align-items:center;">
      <button id="study-back" class="back-btn">← 返回</button>
      <h2 id="study-title">背诵</h2>
    </header>
    <div id="study-list"></div>
  </div>

  <!-- 预览页面 -->
  <div id="preview-page" class="view">
    <header style="display:flex; align-items:center;">
      <button id="preview-back" class="back-btn">← 返回</button>
      <h2 id="preview-title">预览</h2>
    </header>
    <div id="preview-list"></div>
  </div>

  <!-- 弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <p id="modal-message"></p>
      <div class="modal-actions">
        <button id="modal-cancel">取消</button>
        <button id="modal-confirm">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 状态存储
      let newLists = [];
      // 需巩固单词列表，每个列表最多20个单词。当某个列表未满20个时会继续向该列表追加单词。
      let reviewLists = [];
      // 终巩固单词列表：来自需巩固单词列表的单词，每个列表最多20个，独立分组
      let finalLists = [];
      // 序号计数器：用于为新导入的列表和巩固列表生成编号
      let newListCounter = 1;
      let reviewListCounter = 1;
      let finalListCounter = 1;

      // 当前操作列表
      let currentList = null;
      let currentListType = null; // 'new' or 'review' or 'final'
      let selectedMode = 'en2zh';
      let selectedOrder = 'normal';

      // 页面元素
      const loginPage = document.getElementById('login-page');
      const mainPage = document.getElementById('main-page');
      const importPage = document.getElementById('import-page');
      const modePage = document.getElementById('mode-page');
      const studyPage = document.getElementById('study-page');
      const previewPage = document.getElementById('preview-page');
      const modal = document.getElementById('modal');
      const modalMsg = document.getElementById('modal-message');
      const modalCancel = document.getElementById('modal-cancel');
      const modalConfirm = document.getElementById('modal-confirm');
      let modalCallback = null;

      // 登录相关
      const loginBtn = document.getElementById('login-btn');
      const loginPwd = document.getElementById('login-password');
      loginBtn.addEventListener('click', handleLogin);
      loginPwd.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });

      function handleLogin() {
        const val = loginPwd.value.trim();
        if (val === '070713') {
          // 密码正确：清空输入框并隐藏登录页，跳转到主界面
          loginPwd.value = '';
          // 从文档中移除登录页（由于登录页样式使用 display:flex，因此需要彻底移除）
          if (loginPage && loginPage.parentNode) {
            loginPage.parentNode.removeChild(loginPage);
          }
          // 加载数据并切换到主界面
          loadData();
          showPage(mainPage);
        } else {
          showModal('密码错误', null);
        }
      }

      // 如果网址带有#debug则跳过登录，用于调试
      if (window.location.hash === '#debug') {
        // 调试模式：直接移除登录页并显示主界面
        if (loginPage && loginPage.parentNode) {
          loginPage.parentNode.removeChild(loginPage);
        }
        loadData();
        showPage(mainPage);
      }

      // 通用显示/隐藏函数
      function showPage(page) {
        // 隐藏主要功能页面（主/导入/模式/学习/预览），不处理登录页
        [mainPage, importPage, modePage, studyPage, previewPage].forEach(p => {
          p.classList.remove('active');
        });
        // 显示目标页面
        page.classList.add('active');
        // 如果切换到主界面，则刷新列表数据
        if (page === mainPage) {
          updateMainPage();
        }
      }

      // 模态框
      function showModal(message, onConfirm) {
        modalMsg.textContent = message;
        modal.classList.remove('hidden');
        modalCallback = onConfirm;
      }
      modalCancel.addEventListener('click', () => {
        modal.classList.add('hidden');
        modalCallback = null;
      });
      modalConfirm.addEventListener('click', () => {
        modal.classList.add('hidden');
        if (typeof modalCallback === 'function') {
          modalCallback();
        }
        modalCallback = null;
      });

      // 数据加载与保存
      function loadData() {
        try {
          newLists = JSON.parse(localStorage.getItem('newLists')) || [];
          reviewLists = JSON.parse(localStorage.getItem('reviewLists')) || [];
          finalLists = JSON.parse(localStorage.getItem('finalLists')) || [];
          newListCounter = parseInt(localStorage.getItem('newListCounter')) || 1;
          reviewListCounter = parseInt(localStorage.getItem('reviewListCounter')) || 1;
          finalListCounter = parseInt(localStorage.getItem('finalListCounter')) || 1;
        } catch (err) {
          newLists = [];
          reviewLists = [];
          finalLists = [];
          newListCounter = 1;
          reviewListCounter = 1;
          finalListCounter = 1;
        }
      }
      function saveData() {
        localStorage.setItem('newLists', JSON.stringify(newLists));
        localStorage.setItem('reviewLists', JSON.stringify(reviewLists));
        localStorage.setItem('finalLists', JSON.stringify(finalLists));
        localStorage.setItem('newListCounter', newListCounter);
        localStorage.setItem('reviewListCounter', reviewListCounter);
        localStorage.setItem('finalListCounter', finalListCounter);
      }

      // 更新主页面列表
      function updateMainPage() {
        const newContainer = document.getElementById('new-lists');
        const reviewContainer = document.getElementById('review-lists');
        const finalContainer = document.getElementById('final-lists');
        newContainer.innerHTML = '';
        reviewContainer.innerHTML = '';
        finalContainer.innerHTML = '';
        // 新单词列表
        newLists.forEach(list => {
          const row = createListRow(list, 'new');
          newContainer.appendChild(row);
        });
        // 需巩固列表：直接展示 reviewLists 中的所有列表
        reviewLists.forEach(list => {
          const row = createListRow(list, 'review');
          reviewContainer.appendChild(row);
        });
        // 终巩固列表：展示 finalLists
        finalLists.forEach(list => {
          const row = createListRow(list, 'final');
          finalContainer.appendChild(row);
        });
      }

      // 创建列表行
      function createListRow(list, type) {
        const row = document.createElement('div');
        row.className = 'list-item';
        // 名称和数量容器
        const leftWrap = document.createElement('div');
        leftWrap.style.display = 'flex';
        leftWrap.style.alignItems = 'center';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'list-name';
        // 根据类型生成名称：新单词用 List，需巩固用 巩固单词list
        if (type === 'new') {
          nameSpan.textContent = 'List ' + list.id;
        } else if (type === 'review') {
          nameSpan.textContent = '巩固单词list' + list.id;
        } else {
          nameSpan.textContent = '巩固单词final list' + list.id;
        }
        const countSpan = document.createElement('span');
        countSpan.className = 'list-count';
        countSpan.textContent = list.words.length + '个';
        leftWrap.appendChild(nameSpan);
        leftWrap.appendChild(countSpan);
        row.appendChild(leftWrap);
        // 操作按钮容器
        const actions = document.createElement('div');
        actions.className = 'list-actions';
        // 预览按钮
        const previewBtn = document.createElement('button');
        previewBtn.className = 'icon-btn';
        previewBtn.title = '预览';
        previewBtn.textContent = '🔍';
        previewBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openPreview(list, type);
        });
        // 删除按钮
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'icon-btn';
        deleteBtn.title = '删除';
        deleteBtn.textContent = '×';
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showModal('确定删除该列表吗？', () => {
            deleteList(list, type);
          });
        });
        actions.appendChild(previewBtn);
        actions.appendChild(deleteBtn);
        row.appendChild(actions);
        // 点击整行进入模式选择
        row.addEventListener('click', () => {
          startModeSelection(list, type);
        });
        return row;
      }

      // 删除列表
      function deleteList(list, type) {
        if (type === 'new') {
          // 删除新单词列表
          newLists = newLists.filter(item => item.id !== list.id);
        } else if (type === 'review') {
          // 删除需巩固列表
          reviewLists = reviewLists.filter(item => item.id !== list.id);
        } else {
          // 删除终巩固列表
          finalLists = finalLists.filter(item => item.id !== list.id);
        }
        saveData();
        updateMainPage();
      }

      // 打开导入页面
      document.getElementById('open-import').addEventListener('click', () => {
        showPage(importPage);
      });
      // 返回主页面
      document.getElementById('import-back').addEventListener('click', () => {
        showPage(mainPage);
      });
      document.getElementById('mode-back').addEventListener('click', () => {
        showPage(mainPage);
      });
      document.getElementById('study-back').addEventListener('click', () => {
        showPage(modePage);
      });
      document.getElementById('preview-back').addEventListener('click', () => {
        showPage(mainPage);
      });

      // 导入文件
      document.getElementById('import-file-btn').addEventListener('click', () => {
        const fileInput = document.getElementById('csv-file');
        const groupSizeInput = document.getElementById('csv-group-size');
        const groupSize = parseInt(groupSizeInput.value) || 50;
        if (!fileInput.files || fileInput.files.length === 0) {
          showModal('请选择CSV文件', null);
          return;
        }
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          const text = e.target.result;
          const lines = text.split(/\r?\n/);
          const words = [];
          lines.forEach(line => {
            if (!line.trim()) return;
            const parts = line.split(',');
            if (parts.length >= 2) {
              const en = parts[0].trim();
              const zh = parts.slice(1).join(',').trim();
              if (en && zh) {
                words.push({ en: en, zh: zh });
              }
            }
          });
          if (words.length === 0) {
            showModal('文件内容为空或格式不正确', null);
            return;
          }
          appendNewLists(words, groupSize);
          fileInput.value = '';
          groupSizeInput.value = 50;
          showPage(mainPage);
        };
        reader.readAsText(file, 'utf-8');
      });

      // 导入粘贴内容
      document.getElementById('import-paste-btn').addEventListener('click', () => {
        const textArea = document.getElementById('paste-area');
        const groupSizeInput = document.getElementById('paste-group-size');
        const groupSize = parseInt(groupSizeInput.value) || 50;
        const rawText = textArea.value.trim();
        if (!rawText) {
          showModal('请输入单词内容', null);
          return;
        }
        const lines = rawText.split(/\r?\n/);
        const words = [];
        lines.forEach(line => {
          if (!line.trim()) return;
          const parts = line.split(',');
          if (parts.length >= 2) {
            const en = parts[0].trim();
            const zh = parts.slice(1).join(',').trim();
            if (en && zh) words.push({ en: en, zh: zh });
          }
        });
        if (words.length === 0) {
          showModal('内容格式不正确', null);
          return;
        }
        appendNewLists(words, groupSize);
        textArea.value = '';
        groupSizeInput.value = 50;
        showPage(mainPage);
      });

      // 将单词数组按组大小分组并添加到 newLists
      function appendNewLists(words, groupSize) {
        for (let i = 0; i < words.length; i += groupSize) {
          const slice = words.slice(i, i + groupSize);
          const list = { id: newListCounter++, words: slice };
          newLists.push(list);
        }
        saveData();
        updateMainPage();
      }

      // 点击列表行进入模式选择
      function startModeSelection(list, type) {
        currentList = list;
        currentListType = type;
        selectedMode = 'en2zh';
        selectedOrder = 'normal';
        // 清除激活样式
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.order-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('mode-en2zh').classList.add('active');
        document.getElementById('order-normal').classList.add('active');
        // 更新模式选择标题
        if (currentListType === 'new') {
          document.getElementById('mode-title').textContent = 'List ' + list.id;
        } else if (currentListType === 'review') {
          document.getElementById('mode-title').textContent = '巩固单词list' + list.id;
        } else {
          document.getElementById('mode-title').textContent = '巩固单词final list' + list.id;
        }
        showPage(modePage);
      }

      // 模式按钮选择
      document.getElementById('mode-en2zh').addEventListener('click', function() {
        selectedMode = 'en2zh';
        setActiveModeBtn(this);
      });
      document.getElementById('mode-zh2en').addEventListener('click', function() {
        selectedMode = 'zh2en';
        setActiveModeBtn(this);
      });
      function setActiveModeBtn(btn) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      document.getElementById('order-normal').addEventListener('click', function() {
        selectedOrder = 'normal';
        setActiveOrderBtn(this);
      });
      document.getElementById('order-reverse').addEventListener('click', function() {
        selectedOrder = 'reverse';
        setActiveOrderBtn(this);
      });
      document.getElementById('order-random').addEventListener('click', function() {
        selectedOrder = 'random';
        setActiveOrderBtn(this);
      });
      function setActiveOrderBtn(btn) {
        document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
      // 开始背诵
      document.getElementById('start-study').addEventListener('click', () => {
        openStudyPage();
      });

      // 打开学习页面
      function openStudyPage() {
        if (!currentList) return;
        // 根据顺序处理单词列表
        let items = currentList.words.slice();
        if (selectedOrder === 'reverse') items = items.slice().reverse();
        else if (selectedOrder === 'random') {
          // shuffle
          items = items.slice();
          for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
          }
        }
        // 清空列表
        const studyList = document.getElementById('study-list');
        studyList.innerHTML = '';
        // 设置学习页面标题
        if (currentListType === 'new') {
          document.getElementById('study-title').textContent = 'List ' + currentList.id + ' 背诵';
        } else if (currentListType === 'review') {
          document.getElementById('study-title').textContent = '巩固单词list' + currentList.id + ' 背诵';
        } else {
          document.getElementById('study-title').textContent = '巩固单词final list' + currentList.id + ' 背诵';
        }
        // 构建行
        items.forEach((word, idx) => {
          const row = document.createElement('div');
          row.className = 'study-row';
          // 序号
          const idxSpan = document.createElement('span');
          idxSpan.className = 'study-index';
          idxSpan.textContent = idx + 1;
          // 提示
          const promptDiv = document.createElement('div');
          promptDiv.className = 'study-prompt';
          promptDiv.textContent = (selectedMode === 'en2zh' ? word.en : word.zh);
          // 答案
          const ansDiv = document.createElement('div');
          ansDiv.className = 'study-answer';
          ansDiv.textContent = '点击显示';
          ansDiv.dataset.answer = (selectedMode === 'en2zh' ? word.zh : word.en);
          ansDiv.addEventListener('click', () => {
            if (ansDiv.classList.contains('show')) {
              ansDiv.classList.remove('show');
              ansDiv.textContent = '点击显示';
            } else {
              ansDiv.classList.add('show');
              ansDiv.textContent = ansDiv.dataset.answer;
            }
          });
          // ghost按钮：新单词列表点击加入需巩固，需巩固列表点击加入终巩固；终巩固列表不显示
          let ghost = null;
          if (currentListType !== 'final') {
            ghost = document.createElement('span');
            ghost.className = 'ghost-btn';
            ghost.textContent = '👻';
            // 根据列表类型设定标题
            ghost.title = currentListType === 'new' ? '加入需巩固' : '加入巩固单词final';
            ghost.addEventListener('click', (e) => {
              e.stopPropagation();
              // 弹窗确认后根据类型添加单词
              if (currentListType === 'new') {
                showModal('是否添加至需巩固单词本？', () => {
                  addToReviewBuffer(word);
                });
              } else if (currentListType === 'review') {
                showModal('是否添加至巩固单词final本？', () => {
                  addToFinalBuffer(word);
                });
              }
            });
          }
          row.appendChild(idxSpan);
          row.appendChild(promptDiv);
          row.appendChild(ansDiv);
          if (ghost) row.appendChild(ghost);
          studyList.appendChild(row);
        });
        showPage(studyPage);
      }

      // 添加到需巩固缓冲区
      function addToReviewBuffer(word) {
        // 将单词加入当前需巩固列表，未满20个则继续追加，满20个则新开列表
        // 找到未满20个单词的巩固列表，如果不存在则新建
        let targetList = reviewLists.find(item => item.words && item.words.length < 20);
        if (!targetList) {
          targetList = { id: reviewListCounter++, words: [] };
          reviewLists.push(targetList);
        }
        targetList.words.push(word);
        saveData();
        updateMainPage();
      }

      // 添加到终巩固列表
      function addToFinalBuffer(word) {
        // 将单词加入终巩固列表，未满20个则继续追加，满20个则新开列表
        let targetList = finalLists.find(item => item.words && item.words.length < 20);
        if (!targetList) {
          targetList = { id: finalListCounter++, words: [] };
          finalLists.push(targetList);
        }
        targetList.words.push(word);
        saveData();
        updateMainPage();
      }

      // 打开预览页面
      function openPreview(list, type) {
        // 设置预览标题
        if (type === 'new') {
          document.getElementById('preview-title').textContent = 'List ' + list.id + ' 预览';
        } else if (type === 'review') {
          document.getElementById('preview-title').textContent = '巩固单词list' + list.id + ' 预览';
        } else {
          document.getElementById('preview-title').textContent = '巩固单词final list' + list.id + ' 预览';
        }
        const previewList = document.getElementById('preview-list');
        previewList.innerHTML = '';
        list.words.forEach(word => {
          const row = document.createElement('div');
          row.className = 'preview-row';
          const enDiv = document.createElement('div');
          enDiv.className = 'preview-en';
          enDiv.textContent = word.en;
          const zhDiv = document.createElement('div');
          zhDiv.className = 'preview-zh';
          zhDiv.textContent = word.zh;
          row.appendChild(enDiv);
          row.appendChild(zhDiv);
          previewList.appendChild(row);
        });
        showPage(previewPage);
      }
    })();
  </script>
</body>
</html>
